<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect class="box" x="130" y="20" width="140" height="50" rx="5" />
  <text class="text" x="200" y="50">Start</text>

  <path class="arrow" d="M 200 70 L 200 100" />

  <rect class="box" x="130" y="100" width="140" height="50" rx="5" />
  <text class="text" x="200" y="130">Process</text>

  <path class="arrow" d="M 200 150 L 200 180" />

  <rect class="box" x="130" y="180" width="140" height="50" rx="5" />
  <text class="text" x="200" y="210">End</text>

  <defs>
    <style>
      .box { stroke: #333; stroke-width: 2; fill: none; }
      .text { font-family: Arial; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
</svg>
